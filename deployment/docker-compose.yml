version: "3.9"

services:
  classifier:
    build:
      context: ..
      dockerfile: Dockerfile
    image: ticket-classifier:latest
    container_name: ticket-classifier
    ports:
      - "8000:8000"
    volumes:
      # mount models dir so you can update without rebuild
      - ../models:/app/models:ro
      - ../knowledge_base:/app/knowledge_base:ro
    environment:
      - PYTHONUNBUFFERED=1
      - AGENTOPS_API_KEY=${AGENTOPS_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- monitoring stack (enable with: docker compose --profile monitoring up) ---

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - classifier
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # optional: mlflow UI
  mlflow:
    image: python:3.11-slim
    container_name: mlflow-ui
    working_dir: /mlruns
    volumes:
      - ../mlruns:/mlruns
    ports:
      - "5000:5000"
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri file:///mlruns"
    profiles:
      - mlflow
